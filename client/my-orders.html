<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders | ShopX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f4f6f9;
padding:25px;
}

h1{
text-align:center;
margin-bottom:30px;
font-size:35px;
color:#333;
}

.orders{
display:flex;
flex-direction:column;
gap:20px;
}

.order-card{
background:white;
border-radius:18px;
padding:20px;
display:flex;
gap:20px;
align-items:center;
box-shadow:0 10px 25px rgba(0,0,0,.12);
transition:.3s;
}

.order-card:hover{
transform:translateY(-4px);
}

.order-card img{
width:180px;
height:180px;
object-fit:cover;
border-radius:12px;
}

.order-details{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

.order-details h2{
font-size:24px;
color:#222;
}

.price{
font-size:22px;
font-weight:bold;
color:#7c3aed;
}

.address{
color:#555;
line-height:24px;
}

.status{
display:inline-block;
padding:8px 18px;
border-radius:20px;
font-size:14px;
font-weight:600;
color:white;
width:max-content;
}

.pending{
background:#f59e0b;
}

.delivered{
background:#16a34a;
}

.track-btn{
margin-top:10px;
padding:14px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
width:180px;
}

.track-btn:hover{
background:#6d28d9;
}

/* Tablet */

@media(max-width:768px){

body{
padding:18px;
}

h1{
font-size:30px;
}

.order-card{
flex-direction:column;
text-align:center;
}

.order-card img{
width:220px;
height:220px;
}

.order-details{
align-items:center;
}

.track-btn{
width:100%;
}

}

/* Mobile */

@media(max-width:480px){

body{
padding:12px;
}

h1{
font-size:26px;
}

.order-card{
padding:15px;
}

.order-card img{
width:170px;
height:170px;
}

.order-details h2{
font-size:20px;
}

.price{
font-size:18px;
}

.address{
font-size:14px;
}

.track-btn{
width:100%;
font-size:15px;
padding:13px;
}

.status{
font-size:13px;
}

}

</style>

</head>

<body>

<h1>My Orders</h1>

<div class="orders" id="orders"></div>

<script>

const ordersDiv=document.getElementById("orders");

const user=JSON.parse(localStorage.getItem("user"));

if(!user){

window.location.href="login.html";

}

async function getOrders(){

try{

const response=await fetch(

"https://shopx-backends.onrender.com/orders"

);

const orders=await response.json();

const myOrders=orders.filter(order=>order.userEmail===user.email);

ordersDiv.innerHTML="";

if(myOrders.length===0){

ordersDiv.innerHTML="<h2 style='text-align:center;'>No Orders Found</h2>";

return;

}

myOrders.reverse().forEach(order=>{

ordersDiv.innerHTML+=`

<div class="order-card">

<img src="${order.productImage}">

<div class="order-details">

<h2>${order.productName}</h2>

<p class="price">₹${order.productPrice}</p>

<p class="address">${order.customerAddress}</p>

<div class="status ${order.status==="Delivered" ? "delivered":"pending"}">

${order.status}

</div>

<button

class="track-btn"

onclick="trackOrder('${order.status}')">

Track Order

</button>

</div>

</div>

`;

});

}

catch(error){

console.log(error);

alert("Unable to load orders.");

}

}

getOrders();

function trackOrder(status){

if(status==="Delivered"){

alert(`✅ Order Confirmed

📦 Packed

🚚 Shipped

🚪 Out For Delivery

🎉 Delivered`);

}else{

alert(`✅ Order Confirmed

📦 Packed

🚚 Shipped

⏳ Out For Delivery`);

}

}

</script>

</body>

</html>
