

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.form-box{
width:100%;
max-width:450px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
display:flex;
flex-direction:column;
gap:18px;
}

.form-box h1{
text-align:center;
color:#333;
margin-bottom:5px;
}

img{
width:180px;
height:180px;
margin:auto;
object-fit:cover;
border-radius:12px;
border:3px solid #eee;
}

input{
width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#8b5cf6;
box-shadow:0 0 8px rgba(139,92,246,.3);
}

input[type=file]{
padding:10px;
cursor:pointer;
background:#fafafa;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(124,58,237,.3);
}

button:active{
transform:scale(.98);
}

textarea{
width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
outline:none;
resize:none;
height:120px;
transition:.3s;
}

textarea:focus{
border-color:#8b5cf6;
box-shadow:0 0 8px rgba(139,92,246,.3);
}

/* Tablet */

@media(max-width:768px){

.form-box{
max-width:95%;
padding:25px;
}

img{
width:160px;
height:160px;
}

}

/* Mobile */

@media(max-width:480px){

body{
padding:12px;
}

.form-box{
padding:20px;
}

.form-box h1{
font-size:28px;
}

img{
width:140px;
height:140px;
}

input,
button{
padding:13px;
font-size:15px;
}

}

</style>

</head>

<body>

<div class="form-box">

<h1>Edit Product</h1>

<img id="previewImage">

<input
type="text"
id="name"
placeholder="Product Name">

<input
type="number"
id="price"
placeholder="Product Price">

<input
type="text"
id="category"
placeholder="Category">

<input
type="file"
id="image">

<button id="updateBtn">
Update Product
</button>

<!-- <textarea
id="description"
placeholder="Product Description"></textarea> -->

</div>


<script>
// const descriptionInput =
// document.getElementById("description");
const params = new URLSearchParams(window.location.search);

const productId = params.get("id");

const nameInput = document.getElementById("name");
const priceInput = document.getElementById("price");
const categoryInput = document.getElementById("category");
const imageInput = document.getElementById("image");
const previewImage = document.getElementById("previewImage");
const updateBtn = document.getElementById("updateBtn");

// LOAD PRODUCT

async function getProduct(){

try{

const response = await fetch(
"https://shopx-backends.onrender.com/products"
);

const products = await response.json();

const product = products.find(item=>item._id===productId);

if(!product){

alert("Product Not Found");

window.location.href="admin-products.html";

return;

}

nameInput.value=product.name;
priceInput.value=product.price;
categoryInput.value=product.category;

previewImage.src=product.image;

}

catch(error){

console.log(error);

alert("Unable to load product.");

}

}

getProduct();





// IMAGE PREVIEW

imageInput.addEventListener("change",()=>{

const file=imageInput.files[0];

if(file){

previewImage.src=URL.createObjectURL(file);

}

});



// UPDATE PRODUCT

updateBtn.addEventListener("click",async()=>{

if(

nameInput.value.trim()==="" ||

priceInput.value.trim()==="" ||

categoryInput.value.trim()===""

){

alert("Please fill all fields");

return;

}

updateBtn.disabled=true;

updateBtn.innerHTML="Updating...";

try{

const formData=new FormData();

formData.append("name",nameInput.value);

formData.append("price",priceInput.value);

formData.append("category",categoryInput.value);

if(imageInput.files[0]){

formData.append("image",imageInput.files[0]);

}

const response=await fetch(

`https://shopx-backends.onrender.com/products/${productId}`,

{

method:"PUT",

body:formData

}

);

const data=await response.json();

alert(data.message || "Product Updated Successfully");

localStorage.setItem("refreshProducts","true");

window.location.href="admin-products.html";

}

catch(error){

console.log(error);

alert("Something went wrong.");

}

finally{

updateBtn.disabled=false;

updateBtn.innerHTML="Update Product";

}

});

</script>
