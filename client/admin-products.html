<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Products</title>

    <style>
        body {

            font-family: Arial;

            background: #f1f3f6;

            padding: 30px;
        }

        .products {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(250px, 1fr));

            gap: 20px;
        }

        .card {

            background: white;

            padding: 20px;

            border-radius: 15px;
        }

        .card img {

            width: 100%;

            height: 250px;

            object-fit: cover;

            border-radius: 10px;
        }

        button {

            padding: 10px 15px;

            border: none;

            border-radius: 8px;

            color: white;

            cursor: pointer;

            margin-top: 10px;
        }

        .edit-btn {

            background: #8b5cf6;
        }

        .delete-btn {

            background: red;
        }
    </style>

</head>

<body>



    <h1>Admin Products</h1>



    <div class="products" id="products">

    </div>



    <script>

        const productsDiv =
            document.getElementById("products");



        // GET PRODUCTS
        async function getProducts() {

            const response =
                await fetch(

                    "http://localhost:5000/products"

                );



            const products =
                await response.json();



            productsDiv.innerHTML = "";



            products.forEach((product) => {

                productsDiv.innerHTML += `

        <div class="card">

            <img src="${product.image}">

            <h2>${product.name}</h2>

            <p>
                ₹${product.price}
            </p>

            <a href="edit-product.html?id=${product._id}">

<button class="edit-btn">

Edit

</button>

</a>

            <button
            class="delete-btn"

            onclick="deleteProduct(
                '${product._id}'
            )">

                Delete

            </button>

        </div>

        `;

            });

        }



        // DELETE PRODUCT
        async function deleteProduct(id) {

            await fetch(

                `http://localhost:5000/products/${id}`,

                {

                    method: "DELETE"

                }

            );



            getProducts();

        }



        // EDIT PRODUCT


        // LOAD PRODUCTS
        getProducts();

    </script>

</body>

</html>
