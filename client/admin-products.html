<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f1f3f6;
padding:25px;
}

h1{
text-align:center;
margin-bottom:30px;
color:#333;
font-size:35px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
gap:25px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.12);
transition:.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:18px;
display:flex;
flex-direction:column;
flex:1;
}

.card h2{
font-size:22px;
margin-bottom:10px;
color:#333;
}

.price{
font-size:22px;
font-weight:bold;
color:#7c3aed;
margin-bottom:20px;
}

.btn-group{
display:flex;
gap:10px;
margin-top:auto;
}

.btn-group a{
flex:1;
text-decoration:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
color:white;
}

.edit-btn{
background:#7c3aed;
}

.edit-btn:hover{
background:#6d28d9;
}

.delete-btn{
background:#ef4444;
}

.delete-btn:hover{
background:#dc2626;
}

/* Tablet */

@media(max-width:768px){

body{
padding:18px;
}

h1{
font-size:30px;
}

.products{
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.card img{
height:210px;
}

}

/* Mobile */

@media(max-width:480px){

body{
padding:12px;
}

h1{
font-size:26px;
margin-bottom:20px;
}

.products{
grid-template-columns:1fr;
}

.card img{
height:230px;
}

.card-content{
padding:15px;
}

.card h2{
font-size:20px;
}

.price{
font-size:20px;
}

.btn-group{
flex-direction:column;
}

button{
font-size:15px;
}

}

</style>

</head>

<body>

<h1>Admin Products</h1>

<div class="products" id="products"></div>

<script>

const productsDiv=document.getElementById("products");

// GET PRODUCTS

async function getProducts(){

const response=await fetch(
"https://shopx-backends.onrender.com/products"
);

const products=await response.json();

productsDiv.innerHTML="";

products.forEach(product=>{

productsDiv.innerHTML+=`

<div class="card">

<img src="${product.image}" alt="${product.name}">

<div class="card-content">

<h2>${product.name}</h2>

<p class="price">₹${product.price}</p>

<div class="btn-group">

<a href="edit-product.html?id=${product._id}">

<button class="edit-btn">
Edit
</button>

</a>

<button
class="delete-btn"
onclick="deleteProduct('${product._id}')">

Delete

</button>

</div>

</div>

</div>

`;

});

}

// DELETE PRODUCT

async function deleteProduct(id){

const confirmDelete=confirm("Delete this product?");

if(!confirmDelete) return;

await fetch(

`https://shopx-backends.onrender.com/products/${id}`,

{
method:"DELETE"
}

);

getProducts();

}

getProducts();

</script>

</body>
</html>
