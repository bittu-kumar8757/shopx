<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:#f1f3f6;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;
}

.profile-box{

    width:400px;

    background:white;

    padding:30px;

    border-radius:15px;

    display:flex;

    flex-direction:column;

    gap:20px;

    text-align:center;
}

.profile-image{

    width:120px;

    height:120px;

    border-radius:50%;

    background:#8b5cf6;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:40px;

    margin:auto;
}

button{

    padding:14px;

    border:none;

    border-radius:10px;

    background:red;

    color:white;

    font-size:18px;

    cursor:pointer;
}

</style>

</head>

<body>



<div class="profile-box">

    <div class="profile-image"
    id="profileImage">

    </div>



    <h2 id="profileName">

    </h2>



    <p id="profileEmail">

    </p>



    <button id="logoutBtn">

        Logout

    </button>

    <button
id="myOrdersBtn">

My Orders

</button>

</div>



<script>


const myOrdersBtn =
document.getElementById(

"myOrdersBtn"

);



myOrdersBtn.addEventListener(

"click",

() => {

window.location.href =
"my-orders.html";

});

// GET USER
const user = JSON.parse(

    localStorage.getItem("user")

);



// IF NOT LOGIN
if(!user){

    window.location.href =
    "login.html";

}



// ELEMENTS
const profileImage =
document.getElementById("profileImage");

const profileName =
document.getElementById("profileName");

const profileEmail =
document.getElementById("profileEmail");

const logoutBtn =
document.getElementById("logoutBtn");



// SHOW USER
profileName.innerHTML =
user.name;

profileEmail.innerHTML =
user.email;



// FIRST LETTER
profileImage.innerHTML =
user.name.charAt(0);



// LOGOUT
logoutBtn.addEventListener("click", () => {

    localStorage.removeItem("user");



    window.location.href =
    "login.html";

});

</script>

</body>

</html>
