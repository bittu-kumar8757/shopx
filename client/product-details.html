<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details | ShopX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.product-page{
background:#fff;
border-radius:20px;
padding:30px;
display:flex;
gap:40px;
align-items:flex-start;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.product-page img{
width:420px;
height:500px;
object-fit:cover;
border-radius:18px;
}

.details{
flex:1;
display:flex;
flex-direction:column;
gap:18px;
}

.details h1{
font-size:38px;
color:#111827;
}

.price{
font-size:34px;
font-weight:700;
color:#7c3aed;
}

.desc{
font-size:16px;
line-height:1.8;
color:#4b5563;
}

.buttons{
display:flex;
gap:18px;
margin-top:10px;
}

.buttons button{
flex:1;
padding:16px;
border:none;
border-radius:12px;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.buttons button:hover{
transform:translateY(-2px);
}

.cart-btn{
background:#7c3aed;
}

.buy-btn{
background:#16a34a;
}

.related-products{
margin-top:45px;
}

.related-products h2{
margin-bottom:20px;
font-size:28px;
color:#222;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.related-card{
background:#fff;
border-radius:15px;
padding:15px;
text-decoration:none;
color:#222;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.3s;
}

.related-card:hover{
transform:translateY(-5px);
}

.related-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

.related-card h3{
margin-top:12px;
font-size:19px;
}

.related-card p{
margin-top:8px;
font-size:18px;
font-weight:700;
color:#7c3aed;
}

/* ================= TABLET ================= */

@media(max-width:992px){

.product-page{
flex-direction:column;
align-items:center;
}

.product-page img{
width:100%;
max-width:420px;
height:420px;
}

.details{
width:100%;
}

.buttons{
width:100%;
}

}

/* ================= MOBILE ================= */

@media(max-width:768px){

body{
padding:15px;
}

.product-page{
padding:20px;
gap:25px;
}

.product-page img{
height:320px;
}

.details h1{
font-size:28px;
text-align:center;
}

.price{
font-size:28px;
text-align:center;
}

.desc{
text-align:center;
}

.buttons{
flex-direction:column;
}

.buttons button{
width:100%;
}

.related-products h2{
text-align:center;
font-size:24px;
}

.related-grid{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.related-card img{
height:170px;
}

}

/* =============== SMALL MOBILE =============== */

@media(max-width:480px){

body{
padding:10px;
}

.product-page{
padding:15px;
}

.product-page img{
height:260px;
}

.details h1{
font-size:23px;
}

.price{
font-size:24px;
}

.desc{
font-size:14px;
}

.related-grid{
grid-template-columns:1fr;
}

.related-card img{
height:220px;
}

}

</style>

</head>

<body>

<div class="product-page" id="productPage">

</div>

<script>

const params = new URLSearchParams(window.location.search);

const productId = params.get("id");

const productPage = document.getElementById("productPage");

// LOAD PRODUCT

async function getProduct(){

try{

const response = await fetch(
"https://shopx-backends.onrender.com/products"
);

const products = await response.json();

const product = products.find(
item=>item._id===productId
);

if(!product){

productPage.innerHTML="<h2>Product Not Found</h2>";

return;

}

productPage.innerHTML=`

<img src="${product.image}" alt="${product.name}">

<div class="details">

<h1>${product.name}</h1>

<p class="price">₹${product.price}</p>

<p class="desc">${product.description}</p>

<div class="buttons">

<button
class="cart-btn"
id="addCartBtn">

🛒 Add To Cart

</button>

<button
class="buy-btn"
id="buyNowBtn">

⚡ Buy Now

</button>

</div>

<div class="related-products">

<h2>Related Products 😍</h2>

<div class="related-grid">

${products

.filter(item=>

item.category===product.category &&

item._id!==product._id

)

.slice(0,4)

.map(item=>`

<a

href="product-details.html?id=${item._id}"

class="related-card">

<img src="${item.image}">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</a>

`).join("")}

</div>

</div>

</div>

`;

}

catch(error){

console.log(error);

productPage.innerHTML="<h2>Unable to load product.</h2>";

}

}

getProduct();



// BUTTON EVENTS

document.addEventListener("click",(event)=>{

// BUY NOW

if(event.target.id==="buyNowBtn"){

const user=JSON.parse(

localStorage.getItem("user")

);

if(!user){

alert("Please login first.");

window.location.href="login.html";

return;

}

localStorage.setItem(

"buyProduct",

JSON.stringify(productId)

);

window.location.href=

`index.html?buy=${productId}`;

}



// ADD TO CART

if(event.target.id==="addCartBtn"){

let cart=

JSON.parse(

localStorage.getItem("cart")

)||[];

const exists=

cart.find(item=>item._id===productId);

if(exists){

alert("Product already added in cart.");

return;

}

cart.push({

_id:productId

});

localStorage.setItem(

"cart",

JSON.stringify(cart)

);

alert("Product Added To Cart 🛒");

}

});

</script>

</body>

</html>
