<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add Product</title>



<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f1f3f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.form-box{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
    gap:18px;
}

.form-box h1{
    text-align:center;
    color:#333;
    margin-bottom:5px;
}

input,
textarea{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#8b5cf6;
    box-shadow:0 0 8px rgba(139,92,246,.3);
}

textarea{
    height:120px;
    resize:none;
}

input[type=file]{
    padding:10px;
    background:#fafafa;
    cursor:pointer;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#7c3aed,#9333ea);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(124,58,237,.35);
}

button:active{
    transform:scale(.98);
}

/* Tablet */

@media(max-width:768px){

.form-box{
    max-width:95%;
    padding:25px;
}

.form-box h1{
    font-size:32px;
}

}

/* Mobile */

@media(max-width:480px){

body{
    padding:12px;
}

.form-box{
    padding:20px;
    border-radius:12px;
}

.form-box h1{
    font-size:28px;
}

input,
textarea,
button{
    font-size:15px;
    padding:13px;
}

textarea{
    height:100px;
}

}

</style>

</head>

<body>



<div class="form-box">

    <h1>Add Product</h1>



    <input
    type="text"
    id="productName"
    placeholder="Product Name">



    <input
    type="number"
    id="productPrice"
    placeholder="Product Price">



    <input
    type="text"
    id="productCategory"
    placeholder="Category">

    <textarea
id="productDescription"
placeholder="Product Description">

</textarea>


   <input
    type="file"
    id="image">
  



    <button id="addProductBtn">

        Add Product

    </button>

</div>



<script>

const addProductBtn =
document.getElementById("addProductBtn");



addProductBtn.addEventListener("click",
async () => {

    const name =
    document.getElementById("productName").value;

    const price =
    document.getElementById("productPrice").value;

    const category =
    document.getElementById("productCategory").value;

    const image =
    document.getElementById("image").files[0];

    const description =
document.getElementById(

"productDescription"

).value;



    // VALIDATION
   if(

    name === "" ||

    price === "" ||

    category === "" ||

    description === "" ||

    !image

){
        alert("Please fill all fields");

        return;
    }



    try{

    const formData =
new FormData();



formData.append(

    "name",

    name

);

formData.append(

    "price",

    price

);

formData.append(

    "category",

    category

);

formData.append(

    "image",

    image

);

formData.append(

"description",

description

);



const response = await fetch(

    "https://shopx-backends.onrender.com/products",

    {

        method:"POST",

        body:formData

    }

);


        const data =
        await response.json();



        alert(data.message);

    }

    catch(error){

        console.log(error);

    }

});

</script>

</body>

</html>
