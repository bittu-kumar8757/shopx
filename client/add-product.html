<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add Product</title>



<style>

*{

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}



body{

    background:#f1f3f6;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;
}



.form-box{

    width:400px;

    background:white;

    padding:30px;

    border-radius:15px;

    display:flex;

    flex-direction:column;

    gap:15px;
}



input{

    padding:15px;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:16px;
}



button{

    padding:15px;

    border:none;

    border-radius:10px;

    background:#8b5cf6;

    color:white;

    font-size:18px;

    cursor:pointer;
}
 textarea{

    padding:15px;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:16px;

    height:120px;

    resize:none;
}
</style>

</head>

<body>



<div class="form-box">

    <h1>Add Product</h1>



    <input
    type="text"
    id="productName"
    placeholder="Product Name">



    <input
    type="number"
    id="productPrice"
    placeholder="Product Price">



    <input
    type="text"
    id="productCategory"
    placeholder="Category">

    <textarea
id="productDescription"
placeholder="Product Description">

</textarea>


   <input
    type="file"
    id="image">
  



    <button id="addProductBtn">

        Add Product

    </button>

</div>



<script>

const addProductBtn =
document.getElementById("addProductBtn");



addProductBtn.addEventListener("click",
async () => {

    const name =
    document.getElementById("productName").value;

    const price =
    document.getElementById("productPrice").value;

    const category =
    document.getElementById("productCategory").value;

    const image =
    document.getElementById("image").files[0];

    const description =
document.getElementById(

"productDescription"

).value;



    // VALIDATION
   if(

    name === "" ||

    price === "" ||

    category === "" ||

    description === "" ||

    !image

){
        alert("Please fill all fields");

        return;
    }



    try{

    const formData =
new FormData();



formData.append(

    "name",

    name

);

formData.append(

    "price",

    price

);

formData.append(

    "category",

    category

);

formData.append(

    "image",

    image

);

formData.append(

"description",

description

);



const response = await fetch(

    "https://shopx-backends.onrender.com/products",

    {

        method:"POST",

        body:formData

    }

);


        const data =
        await response.json();



        alert(data.message);

    }

    catch(error){

        console.log(error);

    }

});

</script>

</body>

</html>
