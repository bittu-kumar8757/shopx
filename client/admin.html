<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.header h1{
font-size:32px;
color:#333;
}

#logoutBtn{
padding:12px 22px;
background:#ef4444;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:16px;
transition:.3s;
}

#logoutBtn:hover{
background:#dc2626;
}

.orders-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:25px;
}

.order-card{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,.12);
transition:.3s;
display:flex;
flex-direction:column;
}

.order-card:hover{
transform:translateY(-5px);
}

.order-card img{
width:100%;
height:230px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.order-card h2{
font-size:24px;
margin-bottom:10px;
color:#222;
}

.order-card p{
font-size:16px;
margin:6px 0;
color:#555;
line-height:24px;
}

.status{
font-weight:bold;
padding:4px 10px;
border-radius:5px;
display:inline-block;
}

.status.pending{
background:#fff4d6;
color:#f59e0b;
}

.status.delivered{
background:#dcfce7;
color:#16a34a;
}

.btn-group{
display:flex;
gap:10px;
margin-top:20px;
}

.deliver-btn,
.delete-btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
}

.deliver-btn{
background:#16a34a;
}

.deliver-btn:hover{
background:#15803d;
}

.delete-btn{
background:#ef4444;
}

.delete-btn:hover{
background:#dc2626;
}

/* Tablet */

@media(max-width:768px){

.header{
flex-direction:column;
align-items:flex-start;
}

.header h1{
font-size:28px;
}

.orders-container{
grid-template-columns:1fr;
}

.order-card img{
height:220px;
}

}

/* Mobile */

@media(max-width:480px){

body{
padding:12px;
}

.header h1{
font-size:24px;
}

.order-card{
padding:15px;
}

.order-card img{
height:200px;
}

.order-card h2{
font-size:20px;
}

.order-card p{
font-size:14px;
}

.btn-group{
flex-direction:column;
}

.deliver-btn,
.delete-btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="header">

<h1>All Orders</h1>

<button id="logoutBtn">
Logout
</button>

</div>

<div
class="orders-container"
id="ordersContainer">

</div>

<script>

// CHECK ADMIN

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "admin"){
    window.location.href="login.html";
}

const ordersContainer =
document.getElementById("ordersContainer");

// LOAD ORDERS

async function getOrders(){

try{

const response = await fetch(
"https://shopx-backends.onrender.com/orders"
);

const orders = await response.json();

ordersContainer.innerHTML="";

orders.reverse().forEach(order=>{

const statusClass =
order.status==="Delivered"
? "delivered"
: "pending";

const delivered =
order.status==="Delivered";

ordersContainer.innerHTML += `

<div class="order-card">

<img src="${order.productImage}" alt="${order.productName}">

<h2>${order.productName}</h2>

<p><b>Price :</b> ₹${order.productPrice}</p>

<p><b>Size :</b> ${order.productSize}</p>

<p>

<b>Status :</b>

<span class="status ${statusClass}">
${order.status}
</span>

</p>

<p><b>Customer :</b> ${order.customerName}</p>

<p><b>Phone :</b> ${order.customerPhone}</p>

<p><b>Address :</b> ${order.customerAddress}</p>

<div class="btn-group">

<button

class="deliver-btn"

${delivered ? "disabled" : ""}

onclick="markDelivered('${order._id}')">

${delivered ? "Delivered" : "Mark Delivered"}

</button>

<button

class="delete-btn"

onclick="deleteOrder('${order._id}')">

Delete Order

</button>

</div>

</div>

`;

});

}

catch(error){

console.log(error);

alert("Unable to load orders.");

}

}



// DELETE ORDER

async function deleteOrder(id){

const confirmDelete =
confirm("Are you sure you want to delete this order?");

if(!confirmDelete) return;

try{

await fetch(

`https://shopx-backends.onrender.com/orders/${id}`,

{

method:"DELETE"

}

);

getOrders();

}

catch(error){

console.log(error);

}

}



// MARK DELIVERED

async function markDelivered(id){

try{

await fetch(

`https://shopx-backends.onrender.com/orders/${id}`,

{

method:"PUT"

}

);

getOrders();

}

catch(error){

console.log(error);

}

}



// LOGOUT

const logoutBtn =
document.getElementById("logoutBtn");

logoutBtn.addEventListener("click",()=>{

const confirmLogout =
confirm("Logout from admin panel?");

if(!confirmLogout) return;

localStorage.removeItem("user");

window.location.href="login.html";

});


// LOAD ORDERS

getOrders();

</script>
