<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup | ShopX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e293b);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

}

.signup-box{

width:100%;

max-width:430px;

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

display:flex;

flex-direction:column;

gap:18px;

animation:popup .4s ease;

}

@keyframes popup{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.signup-box h1{

text-align:center;

font-size:34px;

color:#7c3aed;

margin-bottom:5px;

}

.signup-box p{

text-align:center;

color:#666;

font-size:15px;

}

input{

width:100%;

padding:15px;

border:1px solid #ccc;

border-radius:12px;

font-size:16px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#8b5cf6;

box-shadow:0 0 10px rgba(139,92,246,.25);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#7c3aed,#9333ea);

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 10px 20px rgba(124,58,237,.35);

}

button:disabled{

opacity:.6;

cursor:not-allowed;

}

a{

color:#7c3aed;

font-weight:600;

text-decoration:none;

}

a:hover{

text-decoration:underline;

}

/* Tablet */

@media(max-width:768px){

.signup-box{

padding:30px;

}

}

/* Mobile */

@media(max-width:480px){

body{

padding:15px;

}

.signup-box{

padding:22px;

border-radius:15px;

}

.signup-box h1{

font-size:28px;

}

input,
button{

padding:13px;

font-size:15px;

}

}

</style>

</head>

<body>

<div class="signup-box">

<h1>Create Account</h1>

<p>Join ShopX and start shopping today</p>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button id="signupBtn">

Create Account

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<script>

const signupBtn=document.getElementById("signupBtn");

signupBtn.addEventListener("click",async()=>{

const name=document.getElementById("name").value.trim();

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value.trim();

if(name==="" || email==="" || password===""){

alert("Please fill all fields");

return;

}

signupBtn.disabled=true;

signupBtn.innerHTML="Creating Account...";

try{

const response=await fetch(

"https://shopx-backends.onrender.com/api/users/signup",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

name,
email,
password

})

}

);

const data=await response.json();

alert(data.message);

if(data.message==="Signup Successful"){

window.location.href="login.html";

}

}

catch(error){

console.log(error);

alert("Server Error");

}

finally{

signupBtn.disabled=false;

signupBtn.innerHTML="Create Account";

}

});

</script>

</body>

</html>
