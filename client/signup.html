<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<style>

*{

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f1f3f6;
}

.signup-box{

    width:350px;

    background:white;

    padding:30px;

    border-radius:15px;

    display:flex;

    flex-direction:column;

    gap:15px;
}

input{

    padding:14px;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:16px;
}

button{

    padding:14px;

    border:none;

    border-radius:10px;

    background:#8b5cf6;

    color:white;

    font-size:18px;

    cursor:pointer;
}

h1{

    text-align:center;
}

p{

    text-align:center;
}

a{

    color:#8b5cf6;

    text-decoration:none;
}

</style>

</head>

<body>



<div class="signup-box">

    <h1>Sign Up</h1>



    <input
    type="text"
    id="name"
    placeholder="Full Name">



    <input
    type="email"
    id="email"
    placeholder="Email">



    <input
    type="password"
    id="password"
    placeholder="Password">



    <button id="signupBtn">

        Create Account

    </button>



    <p>

        Already have account?

        <a href="login.html">

            Login

        </a>

    </p>

</div>



<script>

const signupBtn =
document.getElementById("signupBtn");



signupBtn.addEventListener("click",
async () => {

    const name =
    document.getElementById("name").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;



    // VALIDATION
    if(

        name === "" ||

        email === "" ||

        password === ""

    ){

        alert("Please fill all fields");

        return;
    }



    try{

        const response = await fetch(

            "http://localhost:5000/api/users/signup",

            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    name,
                    email,
                    password

                })

            }

        );



        const data =
        await response.json();



        alert(data.message);



        // REDIRECT LOGIN
        if(

            data.message ===
            "Signup Successful"

        ){

            window.location.href =
            "login.html";

        }

    }

    catch(error){

        console.log(error);

    }

});

</script>

</body>

</html>
