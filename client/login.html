<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | ShopX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e293b);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

}

.login-box{

width:100%;

max-width:420px;

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

display:flex;

flex-direction:column;

gap:18px;

animation:popup .4s ease;

}

@keyframes popup{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.login-box h1{

text-align:center;

color:#7c3aed;

font-size:34px;

margin-bottom:5px;

}

.login-box p{

text-align:center;

color:#666;

font-size:15px;

}

input{

width:100%;

padding:15px;

border:1px solid #ccc;

border-radius:12px;

font-size:16px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#8b5cf6;

box-shadow:0 0 10px rgba(139,92,246,.25);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#7c3aed,#9333ea);

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 10px 20px rgba(124,58,237,.35);

}

button:disabled{

opacity:.7;

cursor:not-allowed;

}

a{

text-decoration:none;

color:#7c3aed;

font-weight:600;

}

a:hover{

text-decoration:underline;

}

/* Tablet */

@media(max-width:768px){

.login-box{

max-width:450px;

padding:30px;

}

}

/* Mobile */

@media(max-width:480px){

body{

padding:15px;

}

.login-box{

padding:22px;

border-radius:15px;

}

.login-box h1{

font-size:28px;

}

input,
button{

padding:13px;

font-size:15px;

}

}

</style>

</head>

<body>

<div class="login-box">

<h1>Welcome Back</h1>

<p>Login to your ShopX account</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button id="loginBtn">

Login

</button>

<p>

Don't have an account?

<a href="signup.html">

Signup

</a>

</p>

</div>

<script>

const loginBtn =
document.getElementById("loginBtn");

loginBtn.addEventListener("click",async()=>{

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

if(email==="" || password===""){

alert("Please fill all fields");

return;

}

loginBtn.disabled=true;

loginBtn.innerHTML="Logging in...";

try{

const response=await fetch(

"https://shopx-backends.onrender.com/api/users/login",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,
password

})

}

);

const data=await response.json();

alert(data.message);

if(data.message==="Login Successful"){

localStorage.setItem(

"user",

JSON.stringify(data.user)

);

if(data.user.role==="admin"){

window.location.href="admin.html";

}else{

window.location.href="index.html";

}

}

}

catch(error){

console.log(error);

alert("Server Error");

}

finally{

loginBtn.disabled=false;

loginBtn.innerHTML="Login";

}

});

</script>

</body>
</html>
